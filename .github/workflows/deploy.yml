name: CI / Deploy

# Cancel in-progress runs for PRs (rapid push spam); never cancel main pushes
# so an in-flight deploy is never killed mid-way.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Job 1: test ───────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Bundle size gate (main chunk ≤ 250 KB gz)
        run: |
          MATCHES=$(find dist/assets -maxdepth 1 -name 'index-*.js' | wc -l)
          if [ "$MATCHES" -eq 0 ]; then echo "Main chunk not found"; exit 1; fi
          if [ "$MATCHES" -gt 1 ]; then echo "Multiple index-*.js files matched; bundle-size gate cannot pick one"; find dist/assets -maxdepth 1 -name 'index-*.js'; exit 1; fi
          MAIN=$(find dist/assets -maxdepth 1 -name 'index-*.js')
          SIZE=$(gzip -c "$MAIN" | wc -c)
          echo "Main chunk gzipped: $SIZE bytes (budget 250000)"
          if [ "$SIZE" -gt 250000 ]; then exit 1; fi

  # ── Job 2: deploy ─────────────────────────────────────────────────────────────
  deploy:
    needs: [test]
    # Only deploy on direct pushes to main — never on PRs or forks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to push the image to GHCR via the auto GITHUB_TOKEN.
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # The action lowercases the repository name automatically,
          # which is required by GHCR (BasselAlnabhan → basselalnabhan).
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up layer reuse across pushes.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-github

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: deploy/docker-compose.yml
          target: ~/quran-reader/
          # strip_components: 1 drops the leading "deploy/" prefix so the file
          # lands at ~/quran-reader/docker-compose.yml not ~/quran-reader/deploy/docker-compose.yml.
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ~/quran-reader
            docker compose pull
            docker compose up -d
            # Removes dangling (untagged) images host-wide. Running containers'
            # images are never dangling, so Nginx Proxy Manager and others are safe.
            docker image prune -f
